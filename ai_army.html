<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RYOSEIWORLD AI組織 ライブビュー</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  color: #eee;
  font-family: 'DotGothic16', 'Courier New', monospace;
  overflow: hidden;
  height: 100vh;
  image-rendering: pixelated;
}

/* ========== ヘッダー（DQ風メニューバー） ========== */
#header {
  background: #0f0f23;
  border-bottom: 3px solid #4a4a8a;
  padding: 6px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 44px;
  z-index: 100;
}
#header h1 {
  font-size: 15px;
  color: #ffd700;
  letter-spacing: 3px;
  text-shadow: 2px 2px 0 #333;
}
#header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-btn {
  color: #aaffaa;
  text-decoration: none;
  font-size: 12px;
  padding: 4px 12px;
  border: 2px solid #aaffaa;
  border-radius: 2px;
  background: rgba(0,255,0,0.05);
  font-family: inherit;
  cursor: pointer;
  transition: background 0.2s;
}
.header-btn:hover { background: rgba(0,255,0,0.15); }
#sync-status {
  font-size: 11px;
  color: #7fff7f;
}
#sync-status::before {
  content: '';
  display: inline-block;
  width: 7px; height: 7px;
  background: #7fff7f;
  border-radius: 50%;
  margin-right: 5px;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ========== メインレイアウト ========== */
#main {
  display: flex;
  height: calc(100vh - 44px);
}

/* ========== マップエリア ========== */
#map-area {
  flex: 1;
  position: relative;
  overflow: hidden;
}
#map-canvas { width: 100%; height: 100%; }
#overlays { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

/* ========== DQ風吹き出し（ウィンドウ） ========== */
.bubble {
  position: absolute;
  background: #0a0a2e;
  border: 3px solid #fff;
  border-radius: 0;
  padding: 8px 12px;
  font-size: 12px;
  color: #fff;
  max-width: 200px;
  pointer-events: none;
  animation: dqOpen 0.15s steps(3);
  z-index: 50;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
  line-height: 1.5;
}
.bubble::after {
  content: '';
  position: absolute;
  bottom: -10px;
  left: 16px;
  width: 0; height: 0;
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-top: 10px solid #fff;
}
@keyframes dqOpen {
  0% { transform: scale(0); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

/* 会議サークル */
.meeting-circle {
  position: absolute;
  border: 3px solid #ffd700;
  border-radius: 50%;
  pointer-events: none;
  animation: meetingGlow 2s infinite;
}
@keyframes meetingGlow {
  0%,100% { box-shadow: 0 0 10px rgba(255,215,0,0.3); opacity:0.5; }
  50% { box-shadow: 0 0 25px rgba(255,215,0,0.6); opacity:1; }
}
.meeting-label {
  position: absolute;
  font-size: 11px;
  color: #ffd700;
  text-align: center;
  pointer-events: none;
  text-shadow: 1px 1px 0 #000;
}

/* ========== サイドパネル（DQ風ウィンドウ） ========== */
#side-panel {
  width: 370px;
  background: #0a0a2e;
  border-left: 3px solid #fff;
  display: flex;
  flex-direction: column;
}
#member-detail {
  display: none;
  padding: 10px 12px;
  background: #0a0a2e;
  border-bottom: 2px solid #888;
}
#member-detail.show { display: block; }
#member-detail h3 { font-size: 14px; color: #ffd700; }
#member-detail .detail-role { font-size: 11px; color: #aaa; }
#member-detail .detail-status { font-size: 12px; color: #7fff7f; margin-top: 3px; }

/* タブ */
#side-tabs {
  display: flex;
  background: #0f0f23;
  border-bottom: 2px solid #888;
}
#side-tabs button {
  flex: 1;
  padding: 8px;
  background: transparent;
  border: none;
  color: #666;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
}
#side-tabs button.active {
  color: #ffd700;
  border-bottom-color: #ffd700;
}
#side-tabs button:hover { color: #fff; }

/* フィルター */
#filter-bar {
  padding: 6px 8px;
  background: #0f0f23;
  border-bottom: 1px solid #333;
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.filter-chip {
  padding: 2px 7px;
  border: 1px solid #555;
  font-size: 10px;
  cursor: pointer;
  background: transparent;
  color: #888;
  font-family: inherit;
}
.filter-chip.active {
  background: #2a2a5e;
  border-color: #ffd700;
  color: #ffd700;
}

/* ログ */
#log-container {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
#log-container::-webkit-scrollbar { width: 5px; }
#log-container::-webkit-scrollbar-thumb { background: #555; }
.log-entry {
  margin-bottom: 8px;
  padding: 6px 8px;
  background: #0f0f23;
  border: 1px solid #333;
  font-size: 11px;
  /* animation removed - was causing shake on update */
}
@keyframes logSlide {
  from { opacity:0; transform:translateX(10px); }
  to { opacity:1; transform:translateX(0); }
}
.log-entry .log-time { color: #666; font-size: 10px; }
.log-entry .log-name { font-weight: bold; margin: 1px 0; }
.log-entry .log-msg { color: #ccc; line-height: 1.4; }
.log-entry.meeting { border-left: 3px solid #ffd700; }
.log-entry.task { border-left: 3px solid #7fff7f; }
.log-entry.think { border-left: 3px solid #6bb8ff; }
.log-entry.real { border-left: 3px solid #ff6b9d; background: #1a0f1a; }
</style>
</head>

<script>
// ========== メンバー定義 ==========
const MEMBERS = [
  { id:'ryosei', name:'RYOSEI社長', emoji:'🤖', color:'#c8b8ff', role:'社長・全体統括', team:'経営', spriteColor:'#8866cc', homeRoom:'社長室' },

  { id:'marke', name:'マーケAI', emoji:'📱', color:'#ff6b9d', role:'SNS・記事・拡散', team:'攻撃', spriteColor:'#cc4466', homeRoom:'営業フロア' },
  { id:'seto', name:'瀬戸さん(CFO)', emoji:'💰', color:'#ffd700', role:'数字管理・ROI', team:'経営', spriteColor:'#ccaa00', homeRoom:'社長室' },
  { id:'bantou', name:'番頭', emoji:'📋', color:'#6bffb8', role:'進捗・タスク管理', team:'管理', spriteColor:'#44aa77', homeRoom:'管理室' },
  { id:'shinpan', name:'審判AI', emoji:'⚖️', color:'#ff4757', role:'品質チェック', team:'守備', spriteColor:'#cc3344', homeRoom:'レビュー室' },
  { id:'houmu', name:'法務AI', emoji:'📜', color:'#a0a0a0', role:'契約・法律(非常勤)', team:'非常勤', spriteColor:'#777777', homeRoom:'待機場' },
  { id:'akira', name:'あきら(Eng)', emoji:'💻', color:'#6bb8ff', role:'エンジニア', team:'実行', spriteColor:'#3388cc', homeRoom:'エンジニア部屋' },
  { id:'hiro', name:'ひろゆき(Eng)', emoji:'🔧', color:'#b86bff', role:'エンジニア', team:'実行', spriteColor:'#7744cc', homeRoom:'エンジニア部屋' },
  { id:'shukudai', name:'宿題管理AI', emoji:'📝', color:'#e94560', role:'宿題整理・振り分け', team:'管理', spriteColor:'#aa3344', homeRoom:'管理室' },
  { id:'kadai', name:'課題管理AI', emoji:'🔥', color:'#ff8c00', role:'課題起票・追跡', team:'管理', spriteColor:'#cc6600', homeRoom:'管理室' },
];

// ========== タイルマップ定義（ドラクエ風） ==========
// 0=草, 1=石畳, 2=壁, 3=木の床, 4=水, 5=花, 6=本棚, 7=机
const TILE_SIZE = 24;
const MAP_W = 34, MAP_H = 24;

// タイルの色パレット（ドラクエ風ドット絵）
const TILE_COLORS = {
  0: { base:'#2d5a1e', detail:'#3a6e28' },  // 草
  1: { base:'#6a6a7a', detail:'#7a7a8a' },  // 石畳
  2: { base:'#4a3a2a', detail:'#5a4a3a' },  // 壁
  3: { base:'#8a6a3a', detail:'#9a7a4a' },  // 木の床
  4: { base:'#2244aa', detail:'#3355bb' },  // 水
  5: { base:'#2d5a1e', detail:'#ff6b9d' },  // 花
  6: { base:'#5a3a1a', detail:'#4a2a0a' },  // 本棚
  7: { base:'#7a5a3a', detail:'#6a4a2a' },  // 机
};

// 部屋定義（タイル座標）
const ROOMS = [
  { name:'社長室', tx:1, ty:1, tw:7, th:5, floor:3, wallColor:'#4a3060' },
  { name:'会議室', tx:10, ty:1, tw:9, th:6, floor:3, wallColor:'#304060' },
  { name:'営業フロア', tx:21, ty:1, tw:8, th:5, floor:3, wallColor:'#604830' },
  { name:'エンジニア部屋', tx:1, ty:8, tw:8, th:6, floor:3, wallColor:'#204050' },
  { name:'管理室', tx:11, ty:9, tw:7, th:5, floor:3, wallColor:'#205040' },
  { name:'レビュー室', tx:21, ty:8, tw:8, th:6, floor:3, wallColor:'#502020' },
  { name:'休憩所', tx:11, ty:16, tw:8, th:5, floor:3, wallColor:'#303030' },
  { name:'待機場', tx:22, ty:16, tw:5, th:6, floor:1, wallColor:'#3a3a5a' },
  { name:'成果物広場', tx:28, ty:16, tw:5, th:6, floor:3, wallColor:'#8a6a00' },
];

// 家具配置（タイル座標）
const FURNITURE = [
  { type:'desk', tx:3, ty:3 }, { type:'desk', tx:5, ty:3 },
  { type:'desk', tx:13, ty:3 }, { type:'desk', tx:15, ty:3 }, { type:'desk', tx:17, ty:3 },
  { type:'desk', tx:23, ty:3 }, { type:'desk', tx:25, ty:3 }, { type:'desk', tx:27, ty:3 },
  { type:'desk', tx:3, ty:10 }, { type:'desk', tx:5, ty:10 }, { type:'desk', tx:7, ty:10 },
  { type:'desk', tx:13, ty:11 }, { type:'desk', tx:15, ty:11 },
  { type:'desk', tx:23, ty:10 }, { type:'desk', tx:25, ty:10 },
  { type:'bookshelf', tx:1, ty:1 }, { type:'bookshelf', tx:7, ty:1 },
  { type:'bookshelf', tx:1, ty:8 }, { type:'bookshelf', tx:8, ty:8 },
  { type:'plant', tx:19, ty:1 }, { type:'plant', tx:29, ty:1 },
  { type:'plant', tx:19, ty:16 },
];

// ========== 状態管理 ==========
let canvas, ctx, overlays;
let characters = [];
let logs = [];
let activeTab = 'all';
let selectedMember = null;
let memberFilters = new Set();
let frameCount = 0;
let tileMap = [];

// ========== タイルマップ生成 ==========
function generateTileMap() {
  // 全部草で初期化
  tileMap = Array.from({length: MAP_H}, () => Array(MAP_W).fill(0));

  // 石畳の通路
  for (let x = 0; x < MAP_W; x++) {
    for (let y = 6; y <= 7; y++) tileMap[y][x] = 1;
    for (let y = 14; y <= 15; y++) tileMap[y][x] = 1;
  }
  for (let y = 0; y < MAP_H; y++) {
    tileMap[y][9] = 1;
    tileMap[y][20] = 1;
  }

  // 部屋の床
  ROOMS.forEach(r => {
    for (let y = r.ty; y < r.ty + r.th; y++) {
      for (let x = r.tx; x < r.tx + r.tw; x++) {
        if (y >= 0 && y < MAP_H && x >= 0 && x < MAP_W) {
          tileMap[y][x] = r.floor;
        }
      }
    }
  });

  // 花をランダムに
  for (let i = 0; i < 15; i++) {
    const x = Math.floor(Math.random() * MAP_W);
    const y = Math.floor(Math.random() * MAP_H);
    if (tileMap[y][x] === 0) tileMap[y][x] = 5;
  }

  // 水（装飾用の池）
  for (let x = 30; x < 33; x++) {
    for (let y = 18; y < 21; y++) {
      if (y < MAP_H && x < MAP_W) tileMap[y][x] = 4;
    }
  }
}

// ========== ドラクエ風タイル描画 ==========
function drawTile(x, y, type) {
  const px = x * TILE_SIZE;
  const py = y * TILE_SIZE;
  const t = TILE_COLORS[type] || TILE_COLORS[0];

  ctx.fillStyle = t.base;
  ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);

  // ドット絵ディテール
  ctx.fillStyle = t.detail;
  if (type === 0) { // 草
    ctx.fillRect(px+4, py+4, 2, 2);
    ctx.fillRect(px+14, py+12, 2, 2);
    ctx.fillRect(px+8, py+18, 2, 2);
  } else if (type === 1) { // 石畳
    ctx.strokeStyle = '#5a5a6a';
    ctx.lineWidth = 1;
    ctx.strokeRect(px+1, py+1, TILE_SIZE/2-2, TILE_SIZE/2-2);
    ctx.strokeRect(px+TILE_SIZE/2, py+TILE_SIZE/2, TILE_SIZE/2-1, TILE_SIZE/2-1);
  } else if (type === 3) { // 木の床
    ctx.fillRect(px, py+6, TILE_SIZE, 1);
    ctx.fillRect(px, py+18, TILE_SIZE, 1);
    ctx.fillRect(px+12, py, 1, TILE_SIZE);
  } else if (type === 4) { // 水
    const wave = Math.sin(frameCount * 0.03 + x + y) * 0.3;
    ctx.globalAlpha = 0.4 + wave;
    ctx.fillRect(px+2, py+8, 8, 2);
    ctx.fillRect(px+12, py+14, 6, 2);
    ctx.globalAlpha = 1;
  } else if (type === 5) { // 花
    ctx.fillRect(px+4, py+4, 2, 2);
    ctx.fillRect(px+14, py+12, 2, 2);
    ctx.fillStyle = '#ffee44';
    ctx.fillRect(px+10, py+8, 3, 3);
    ctx.fillStyle = '#ff4466';
    ctx.fillRect(px+4, py+16, 3, 3);
  }
}

// ========== 家具描画 ==========
function drawFurniture() {
  FURNITURE.forEach(f => {
    const px = f.tx * TILE_SIZE;
    const py = f.ty * TILE_SIZE;

    if (f.type === 'desk') {
      // ドラクエ風の机
      ctx.fillStyle = '#8a6a3a';
      ctx.fillRect(px+2, py+6, TILE_SIZE-4, TILE_SIZE-8);
      ctx.fillStyle = '#a07a4a';
      ctx.fillRect(px+3, py+7, TILE_SIZE-6, TILE_SIZE-10);
      // 天板のハイライト
      ctx.fillStyle = '#b08a5a';
      ctx.fillRect(px+4, py+7, TILE_SIZE-8, 2);
    } else if (f.type === 'bookshelf') {
      ctx.fillStyle = '#5a3a1a';
      ctx.fillRect(px+1, py+1, TILE_SIZE-2, TILE_SIZE-2);
      // 本
      ctx.fillStyle = '#cc3333';
      ctx.fillRect(px+3, py+3, 4, 8);
      ctx.fillStyle = '#3366cc';
      ctx.fillRect(px+8, py+3, 4, 8);
      ctx.fillStyle = '#33aa33';
      ctx.fillRect(px+13, py+3, 4, 8);
      ctx.fillStyle = '#ccaa33';
      ctx.fillRect(px+3, py+13, 4, 7);
      ctx.fillStyle = '#aa33aa';
      ctx.fillRect(px+8, py+13, 4, 7);
    } else if (f.type === 'plant') {
      ctx.fillStyle = '#5a3a1a';
      ctx.fillRect(px+8, py+16, 8, 6);
      ctx.fillStyle = '#2d7a1e';
      ctx.fillRect(px+4, py+4, 16, 14);
      ctx.fillStyle = '#3a9a28';
      ctx.fillRect(px+6, py+2, 12, 6);
      ctx.fillRect(px+8, py+0, 8, 4);
    }
  });
}

// ========== 部屋の壁描画 ==========
function drawRoomWalls() {
  ROOMS.forEach(r => {
    const px = r.tx * TILE_SIZE;
    const py = r.ty * TILE_SIZE;
    const pw = r.tw * TILE_SIZE;
    const ph = r.th * TILE_SIZE;

    // 壁
    ctx.strokeStyle = r.wallColor;
    ctx.lineWidth = 3;
    ctx.strokeRect(px-1, py-1, pw+2, ph+2);

    // 壁の上部ハイライト
    ctx.strokeStyle = '#fff';
    ctx.globalAlpha = 0.15;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(px+pw, py);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // 部屋名（DQ風ウィンドウ）
    const nameW = r.name.length * 13 + 16;
    ctx.fillStyle = '#0a0a2e';
    ctx.fillRect(px+4, py-14, nameW, 16);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.strokeRect(px+4, py-14, nameW, 16);
    ctx.fillStyle = '#ffd700';
    ctx.font = '11px "DotGothic16", monospace';
    ctx.textAlign = 'left';
    ctx.fillText(r.name, px+10, py-3);
  });
}

// ========== ドラクエ風キャラクター ==========
class Character {
  constructor(member, tx, ty) {
    this.member = member;
    this.x = tx * TILE_SIZE + TILE_SIZE/2;
    this.y = ty * TILE_SIZE + TILE_SIZE/2;
    this.targetX = this.x;
    this.targetY = this.y;
    this.speed = 0.8 + Math.random() * 0.4;
    this.frame = 0;
    this.direction = 0; // 0=down, 1=left, 2=right, 3=up
    this.state = 'idle';
    this.stateTimer = 0;
    this.homeRoom = null;
    this.currentRoom = null;
    this.bubble = null;
    this.bubbleTimer = 0;
    this.walkFrame = 0;
    this.currentTask = ''; // 担当中のタスク名
    this.homeworkList = []; // 担当宿題リスト
  }

  update() {
    this.frame++;

    // 作業中・会議中は動かない
    if (this.state === 'working' || this.state === 'meeting') {
      this.stateTimer--;
      if (this.stateTimer <= 0) {
        this.state = 'idle';
        this.currentTask = '';
        this.decideNextAction();
      }
      if (this.bubbleTimer > 0) {
        this.bubbleTimer--;
        if (this.bubbleTimer <= 0) this.removeBubble();
      }
      return;
    }

    this.stateTimer--;
    const dx = this.targetX - this.x;
    const dy = this.targetY - this.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist > 2) {
      this.state = 'walking';
      this.x += (dx/dist) * this.speed;
      this.y += (dy/dist) * this.speed;
      this.walkFrame++;
      if (Math.abs(dx) > Math.abs(dy)) {
        this.direction = dx > 0 ? 2 : 1;
      } else {
        this.direction = dy > 0 ? 0 : 3;
      }
    } else if (this.stateTimer <= 0) {
      this.decideNextAction();
    }

    if (this.bubbleTimer > 0) {
      this.bubbleTimer--;
      if (this.bubbleTimer <= 0) this.removeBubble();
    }
  }

  decideNextAction() {
    // 宿題があるメンバーは必ず作業
    if (this.homeworkList && this.homeworkList.length > 0) {
      const hw = this.homeworkList[Math.floor(Math.random() * this.homeworkList.length)];
      const home = ROOMS.find(r => r.name === this.member.homeRoom);
      if (home) {
        this.targetX = (home.tx + 1 + Math.random() * (home.tw-2)) * TILE_SIZE;
        this.targetY = (home.ty + 1 + Math.random() * (home.th-2)) * TILE_SIZE;
      }
      this.state = 'working';
      this.stateTimer = 300 + Math.random() * 400;
      this.currentTask = hw.title;
      this.showBubble(hw.title.substring(0, 30) + '...やってる');
      this.bubbleTimer = 200;
      addLog(this.member, `📝 ${hw.title} に取り組み中`, 'task');
      return;
    }

    const roll = Math.random();
    if (roll < 0.4) {
      // 作業開始（宿題なしでも通常業務）
      const home = ROOMS.find(r => r.name === this.member.homeRoom);
      if (home) {
        this.targetX = (home.tx + 1 + Math.random() * (home.tw-2)) * TILE_SIZE;
        this.targetY = (home.ty + 1 + Math.random() * (home.th-2)) * TILE_SIZE;
      }
      this.state = 'working';
      this.stateTimer = 250 + Math.random() * 350;
      this.startTask();
    } else {
      // 待機 → 宿題なしなら待機場、非常勤も待機場
      const hasWork = this.member.team !== '非常勤';
      const dest = hasWork
        ? ROOMS.find(r => r.name === this.member.homeRoom)
        : ROOMS.find(r => r.name === '待機場');
      if (dest) {
        this.targetX = (dest.tx + 1 + Math.random() * (dest.tw-2)) * TILE_SIZE;
        this.targetY = (dest.ty + 1 + Math.random() * (dest.th-2)) * TILE_SIZE;
      }
      this.state = 'idle';
      this.currentTask = '';
      this.removeBubble();
      this.stateTimer = 200 + Math.random() * 300;
    }
  }

  // タスクを取って、作業中にタスク内容を喋る
  startTask() {
    const tasks = getTasksForMember(this.member.id);
    const task = tasks[Math.floor(Math.random() * tasks.length)];
    this.currentTask = task.name;
    // 作業開始時に一言
    this.showBubble(task.start);
    addLog(this.member, task.start, 'task');
    // 作業途中で進捗報告
    if (task.progress) {
      setTimeout(() => {
        if (this.state === 'working') {
          this.showBubble(task.progress);
          this.bubbleTimer = 180;
          addLog(this.member, task.progress, 'think');
        }
      }, 3000 + Math.random() * 4000);
    }
    // 作業完了時に報告
    const finishTime = (this.stateTimer * 16) - 500;
    if (task.done) {
      setTimeout(() => {
        if (this.state === 'working') {
          this.showBubble(task.done);
          this.bubbleTimer = 200;
          addLog(this.member, task.done, 'task');
        }
      }, Math.max(2000, finishTime));
    }
  }

  findCurrentRoom() {
    const tx = Math.floor(this.x / TILE_SIZE);
    const ty = Math.floor(this.y / TILE_SIZE);
    for (const room of ROOMS) {
      if (tx >= room.tx && tx < room.tx+room.tw && ty >= room.ty && ty < room.ty+room.th) {
        this.currentRoom = room.name;
        return room;
      }
    }
    return ROOMS[0];
  }

  sayThought() {
    // startTaskに統合済み。フォールバック用
    this.startTask();
  }

  showBubble(text) {
    this.removeBubble();
    const div = document.createElement('div');
    div.className = 'bubble';
    div.textContent = text;
    overlays.appendChild(div);
    this.bubble = div;
    this.bubbleTimer = 200;
  }

  removeBubble() {
    if (this.bubble) { this.bubble.remove(); this.bubble = null; }
  }

  draw(ctx) {
    const px = Math.round(this.x);
    const py = Math.round(this.y);
    const S = TILE_SIZE; // スプライトサイズ
    const c = this.member.spriteColor;

    // 影
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.ellipse(px, py+S/2+2, S*0.4, 3, 0, 0, Math.PI*2);
    ctx.fill();

    // 歩行アニメフレーム
    const step = this.state === 'walking' ? Math.floor(this.walkFrame / 8) % 4 : 0;
    const bob = this.state === 'walking' ? (step % 2 === 0 ? 0 : -2) : 0;

    // === ドラクエ風16x16スプライト描画 ===
    const ox = px - 8; // 左上原点
    const oy = py - 12 + bob;
    const p = 2; // ピクセルサイズ

    // 髪・頭
    ctx.fillStyle = c;
    // 頭部
    ctx.fillRect(ox+2*p, oy+0*p, 4*p, 1*p);
    ctx.fillRect(ox+1*p, oy+1*p, 6*p, 1*p);
    ctx.fillRect(ox+1*p, oy+2*p, 6*p, 1*p);

    // 顔
    ctx.fillStyle = '#ffccaa';
    ctx.fillRect(ox+2*p, oy+3*p, 4*p, 2*p);

    // 目
    ctx.fillStyle = '#111';
    if (this.direction !== 3) { // 後ろ向き以外
      ctx.fillRect(ox+2*p, oy+3*p, 1*p, 1*p);
      ctx.fillRect(ox+5*p, oy+3*p, 1*p, 1*p);
    }

    // 体
    ctx.fillStyle = c;
    ctx.globalAlpha = 0.9;
    ctx.fillRect(ox+1*p, oy+5*p, 6*p, 3*p);
    ctx.globalAlpha = 1;

    // 腕
    const armOff = step === 1 ? -1*p : step === 3 ? 1*p : 0;
    ctx.fillStyle = c;
    ctx.fillRect(ox+0*p, oy+5*p+armOff, 1*p, 2*p);
    ctx.fillRect(ox+7*p, oy+5*p-armOff, 1*p, 2*p);

    // 足
    ctx.fillStyle = '#553322';
    if (this.state === 'walking') {
      const legL = step < 2 ? 0 : 1*p;
      const legR = step < 2 ? 1*p : 0;
      ctx.fillRect(ox+2*p, oy+8*p+legL, 2*p, 1*p);
      ctx.fillRect(ox+4*p, oy+8*p+legR, 2*p, 1*p);
    } else {
      ctx.fillRect(ox+2*p, oy+8*p, 2*p, 1*p);
      ctx.fillRect(ox+4*p, oy+8*p, 2*p, 1*p);
    }

    // 作業中エフェクト
    if (this.state === 'working') {
      const sparkle = Math.floor(this.frame / 10) % 4;
      ctx.fillStyle = '#ffd700';
      ctx.globalAlpha = 0.7;
      if (sparkle === 0) ctx.fillRect(px+10, py-16, 3, 3);
      if (sparkle === 1) ctx.fillRect(px+14, py-12, 3, 3);
      if (sparkle === 2) ctx.fillRect(px+12, py-18, 3, 3);
      if (sparkle === 3) ctx.fillRect(px+8, py-14, 3, 3);
      ctx.globalAlpha = 1;
    }

    // 名前タグ（DQ風）
    const name = this.member.emoji + this.member.name;
    const tw = ctx.measureText(name).width;
    ctx.fillStyle = 'rgba(10,10,46,0.8)';
    ctx.fillRect(px - tw/2 - 4, py - 24, tw + 8, 14);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.strokeRect(px - tw/2 - 4, py - 24, tw + 8, 14);
    ctx.fillStyle = this.member.color;
    ctx.font = '10px "DotGothic16", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(name, px, py - 14);

    // タスクバッジ（担当タスク表示）
    if (this.currentTask) {
      const taskText = this.currentTask.length > 20 ? this.currentTask.substring(0,20)+'...' : this.currentTask;
      ctx.font = '9px "DotGothic16", monospace';
      const ttw = ctx.measureText(taskText).width;
      ctx.fillStyle = 'rgba(0,40,0,0.85)';
      ctx.fillRect(px - ttw/2 - 3, py + 14, ttw + 6, 12);
      ctx.strokeStyle = '#7fff7f';
      ctx.lineWidth = 1;
      ctx.strokeRect(px - ttw/2 - 3, py + 14, ttw + 6, 12);
      ctx.fillStyle = '#7fff7f';
      ctx.textAlign = 'center';
      ctx.fillText(taskText, px, py + 23);
    }

    // 吹き出し位置更新
    if (this.bubble) {
      this.bubble.style.left = (px - 30) + 'px';
      this.bubble.style.top = (py - 80) + 'px';
    }
  }
}

function startMeeting() {
  const topic = MEETING_TOPICS[Math.floor(Math.random() * MEETING_TOPICS.length)];
  const room = ROOMS[1]; // 会議室
  const cx = (room.tx + room.tw/2) * TILE_SIZE;
  const cy = (room.ty + room.th/2) * TILE_SIZE;

  const meetingChars = [];
  topic.members.forEach((id, i) => {
    const char = characters.find(c => c.member.id === id);
    if (char) {
      const angle = (Math.PI*2 / topic.members.length) * i;
      char.targetX = cx + Math.cos(angle) * 35;
      char.targetY = cy + Math.sin(angle) * 25;
      char.state = 'meeting';
      char.stateTimer = topic.duration;
      meetingChars.push(char);
    }
  });

  const circle = document.createElement('div');
  circle.className = 'meeting-circle';
  circle.style.left = (cx-50)+'px'; circle.style.top = (cy-45)+'px';
  circle.style.width = '100px'; circle.style.height = '90px';
  overlays.appendChild(circle);

  const label = document.createElement('div');
  label.className = 'meeting-label';
  label.textContent = '⚔️ ' + topic.title;
  label.style.left = (cx-55)+'px'; label.style.top = (cy-65)+'px'; label.style.width = '110px';
  overlays.appendChild(label);

  addLog({name:'SYSTEM',emoji:'⚔️',color:'#ffd700'}, `【${topic.title}】開始`, 'meeting');

  const convos = MEETING_CONVOS[topic.title] || [];
  convos.forEach((line, i) => {
    setTimeout(() => {
      const char = characters.find(c => c.member.id === line.s);
      if (char) { char.showBubble(line.m); char.bubbleTimer = 180; }
      addLog(MEMBERS.find(m=>m.id===line.s)||MEMBERS[0], `[${topic.title}] ${line.m}`, 'meeting');
    }, 2500 + i*3500);
  });

  setTimeout(() => { circle.remove(); label.remove();
    // 議事録を生成
    const minutes = {
      title: topic.title,
      time: new Date().toLocaleTimeString('ja-JP'),
      members: topic.members.map(id => { const m = MEMBERS.find(m=>m.id===id); return m ? m.emoji+m.name : id; }),
      discussions: convos.map(l => { const m = MEMBERS.find(m=>m.id===l.s); return { speaker: m?m.emoji+m.name:l.s, msg: l.m }; }),
      conclusion: topic.title.includes('営業') ? '営業アクション3件確定' :
                  topic.title.includes('品質') ? 'レビュー完了、修正指示あり' :
                  topic.title.includes('コスト') ? 'コスト最適化案承認' :
                  topic.title.includes('技術') ? '技術方針決定' :
                  topic.title.includes('コンテンツ') ? 'コンテンツ計画確定' :
                  topic.title.includes('全体') ? '全体方針確認、各自実行へ' : '議論完了'
    };
    meetingMinutes.unshift(minutes);
    if (meetingMinutes.length > 20) meetingMinutes.pop();
    addLog({name:'SYSTEM',emoji:'✅',color:'#7fff7f'}, `【${topic.title}】終了 — ${minutes.conclusion}`, 'meeting');
  }, topic.duration * 16);
}

function triggerTask() {
  const t = TASKS[Math.floor(Math.random()*TASKS.length)];
  const char = characters.find(c=>c.member.id===t.m);
  const mem = MEMBERS.find(m=>m.id===t.m);
  if(char&&mem){char.state='working';char.stateTimer=250+Math.random()*200;char.currentTask=t.msg;char.showBubble(t.msg);char.bubbleTimer=220;addLog(mem,t.msg,'task');}

// ========== ログ ==========
function addLog(member, msg, type) {
  const now = new Date();
  const ts = [now.getHours(),now.getMinutes(),now.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':');
  logs.unshift({time:ts, member, msg, type, timestamp:Date.now()});
  if (logs.length > 500) logs.pop();
  renderLogs();
}

// ========== クリック ==========
function handleClick(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  let clicked = null;
  characters.forEach(c => { if (Math.sqrt((mx-c.x)**2+(my-c.y)**2)<20) clicked=c; });

  const detail = document.getElementById('member-detail');
  if (clicked) {
    selectedMember = clicked.member;
    detail.className = 'show';
    const stLabel = clicked.state==='meeting'?'🔴 会議中':clicked.state==='working'?'🟡 作業中':clicked.state==='walking'?'🟢 移動中':'⚪ 待機中';
    detail.innerHTML = `<h3>${clicked.member.emoji} ${clicked.member.name}</h3><div class="detail-role">${clicked.member.role} / ${clicked.member.team}チーム</div><div class="detail-status">状態: ${stLabel}</div><div style="font-size:11px;color:#888;margin-top:3px">場所: ${clicked.currentRoom||'外'}</div>`;
    memberFilters.clear(); memberFilters.add(clicked.member.id);
    document.querySelectorAll('.filter-chip').forEach((c,i)=>c.classList.toggle('active',MEMBERS[i].id===clicked.member.id));
    renderLogs();
  } else {
    selectedMember=null; detail.className=''; detail.innerHTML='';
    memberFilters.clear(); document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
    renderLogs();
  }
}

let homeworkData = [];
const ASSIGNEE_MAP = {
  'あきら': 'akira', 'ひろゆき': 'hiro', '瀬戸さん': 'seto', '瀬戸': 'seto',
  '営業AI': 'eigyo', 'マーケAI': 'marke', '審判AI': 'shinpan', '番頭': 'bantou',
  '法務AI': 'houmu', 'RYOSEI': 'ryosei', '園田みのり': 'bantou', 'Gemini': 'ryosei',
  '涼晴': null, // 涼晴は人間なので表示のみ
  '宿題管理AI': 'shukudai', '課題管理AI': 'kadai',
};

let issueData = [];
let outputData = [];
let meetingMinutes = [];

function toggleOutputDetail(idx) {
  const el = document.getElementById('output-detail-' + idx);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function fetchHomework() {
  try {
    const res = await fetch('./dashboard_data.json?' + Date.now());
    if (!res.ok) return;
    const data = await res.json();
    homeworkData = (data.homework || []).filter(h => h.status !== 'done');
    issueData = (data.tasks || []).filter(t => t.status !== 'closed');
    outputData = (data.completed || []).slice(0, 30);
    assignHomeworkToMembers();
    assignIssuesToMembers();
  } catch(e) { console.warn('宿題取得失敗:', e); }
}

function assignIssuesToMembers() {
  // 課題管理AIに全課題を持たせる
  const kadaiChar = characters.find(c => c.member.id === 'kadai');
  if (kadaiChar) {
    kadaiChar.homeworkList = issueData.map(i => ({title: i.title, assignee: i.assignee}));
    if (issueData.length > 0 && kadaiChar.state === 'idle') {
      kadaiChar.state = 'working';
      kadaiChar.stateTimer = 400;
      kadaiChar.currentTask = `課題${issueData.length}件を管理中`;
      kadaiChar.showBubble(`課題${issueData.length}件追跡中...`);
      kadaiChar.bubbleTimer = 200;
    }
  }
  // 宿題管理AIにも
  const shukudaiChar = characters.find(c => c.member.id === 'shukudai');
  if (shukudaiChar) {
    shukudaiChar.homeworkList = homeworkData;
    if (homeworkData.length > 0 && shukudaiChar.state === 'idle') {
      shukudaiChar.state = 'working';
      shukudaiChar.stateTimer = 400;
      shukudaiChar.currentTask = `宿題${homeworkData.length}件を整理中`;
      shukudaiChar.showBubble(`宿題${homeworkData.length}件振り分け中...`);
      shukudaiChar.bubbleTimer = 200;
    }
  }
}

function assignHomeworkToMembers() {
  // 各メンバーの宿題を割り当て
  characters.forEach(c => { c.homeworkList = []; });

  homeworkData.forEach(hw => {
    const assignee = hw.assignee || '';
    // 複数担当（+区切り）対応
    const names = assignee.split('+').map(s => s.trim());
    names.forEach(name => {
      const memberId = ASSIGNEE_MAP[name];
      if (memberId) {
        const char = characters.find(c => c.member.id === memberId);
        if (char) char.homeworkList.push(hw);
      }
    });
  });

  // 宿題を持ってるメンバーは作業状態にして、宿題内容を喋る
  characters.forEach(c => {
    if (c.homeworkList.length > 0 && c.state === 'idle') {
      const hw = c.homeworkList[0];
      c.state = 'working';
      c.stateTimer = 400 + Math.random() * 300;
      c.currentTask = hw.title;
      // 所属部屋に移動
      const home = ROOMS.find(r => r.name === c.member.homeRoom);
      if (home) {
        c.targetX = (home.tx + 1 + Math.random() * (home.tw-2)) * TILE_SIZE;
        c.targetY = (home.ty + 1 + Math.random() * (home.th-2)) * TILE_SIZE;
      }
      c.showBubble(hw.title.substring(0, 35) + '...対応中');
      c.bubbleTimer = 250;
      addLog(c.member, `📝 [宿題] ${hw.title}`, 'task');
    }
  });
}

// ========== スプレッドシート連携 ==========
let LIVE_VIEW_API_URL = localStorage.getItem('liveViewApiUrl') || 'https://script.google.com/macros/s/AKfycbw55IISrXs7I2d8zoRylm9yvMHtw2RUJu4ZfPm-e_KDVfaucdHSUzd5WlY0mQKl1NZJ/exec';

window.setApiUrl = function(url) {
  LIVE_VIEW_API_URL = url;
  localStorage.setItem('liveViewApiUrl', url);
  console.log('API URL設定完了:', url);
  fetchRealData();
};

async function fetchRealData() {
  let gasOk = false, localOk = false;

  // 1. GAS API（24時間データ）
  if (LIVE_VIEW_API_URL) {
    try {
      const res = await fetch(LIVE_VIEW_API_URL + '?action=all');
      if (res.ok) { processRealData(await res.json()); gasOk = true; }
    } catch(e) { console.warn('GAS取得失敗:', e); }
  }

  // 2. ローカルJSON（Claude Codeセッション中のリアルタイムデータ）
  try {
    const res = await fetch('./live_data.json?' + Date.now());
    if (res.ok) { processRealData(await res.json()); localOk = true; }
  } catch(e) {}

  // ステータス表示
  if (gasOk && localOk) updateSync(true, 'リアルタイム同期 + ローカル');
  else if (gasOk) updateSync(true, 'リアルタイム同期');
  else if (localOk) updateSync(true, 'ローカル同期');
  else updateSync(false, 'オフライン');
}

function processRealData(data) {
  if (data.logs) {
    data.logs.slice(0,20).reverse().forEach(log => {
      const mem = identifyMember(log.system, log.memo);
      const msg = log.memo || log.status || log.system;
      if (!msg || logs.some(l=>l.time===log.time && l.msg===msg)) return;
      addLog(mem, `[実データ] ${msg}`, 'task');
      const char = characters.find(c=>c.member.id===mem.id);
      if(char){char.state='working';char.stateTimer=300;char.currentTask=msg.substring(0,40);char.showBubble(msg.substring(0,40));char.bubbleTimer=200;}
    });
  }
  if (data.tasks) {
    data.tasks.slice(0,10).forEach(task => {
      if (!task.command) return;
      const mem = identifyMember(task.target, task.command);
      const se = task.status==='完了'?'✅':task.status==='下書き'?'📝':task.status==='処理中...'?'⏳':'📋';
      if (!logs.some(l=>l.msg.includes(task.command.substring(0,30))))
        addLog(mem, `${se} ${task.command.substring(0,80)}`, 'task');
    });
  }
}

function identifyMember(sys, txt) {
  const c = ((sys||'')+' '+(txt||'')).toLowerCase();
  const map = {
    ryosei:['ryosei','社長','autopilot','processcommands'],eigyo:['営業','eigyo','lancers','ランサーズ','提案','dm'],
    marke:['マーケ','note','tiktok','sns','記事'],seto:['瀬戸','cfo','収支','roi'],
    bantou:['番頭','進捗','タスク','kpi'],shinpan:['審判','レビュー','品質','チェック'],
    houmu:['法務','契約'],akira:['あきら','デプロイ','api','gas'],hiro:['ひろゆき','インフラ','n8n'],
  };
  for (const [id,kws] of Object.entries(map))
    for (const kw of kws) if(c.includes(kw.toLowerCase())) return MEMBERS.find(m=>m.id===id)||MEMBERS[0];
  return MEMBERS[0];
}

function updateSync(ok, label) {
  const el = document.getElementById('sync-status');
  el.textContent = label;
  el.style.color = ok ? '#7fff7f' : '#ffaa00';
}

// ========== マップ描画 ==========
function drawMap() {
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // タイル
  for (let y=0; y<MAP_H; y++)
    for (let x=0; x<MAP_W; x++)
      drawTile(x, y, tileMap[y]?.[x] || 0);

  drawRoomWalls();
  drawFurniture();
}

// ========== メインループ ==========
function init() {
  canvas = document.getElementById('map-canvas');
  ctx = canvas.getContext('2d');
  overlays = document.getElementById('overlays');

  function resize() {
    const area = document.getElementById('map-area');
    canvas.width = area.clientWidth;
    canvas.height = area.clientHeight;
  }
  resize();
  window.addEventListener('resize', resize);
  canvas.addEventListener('click', handleClick);

  generateTileMap();

  // キャラクター配置（タイル座標）
  // 初期配置: 各メンバーの所属部屋に配置
  const starts = [
    {tx:3,ty:3},   // RYOSEI → 社長室
    {tx:23,ty:2},  // 営業AI → 営業フロア
    {tx:25,ty:3},  // マーケAI → 営業フロア
    {tx:5,ty:3},   // 瀬戸さん → 社長室
    {tx:13,ty:11}, // 番頭 → 管理室
    {tx:23,ty:10}, // 審判AI → レビュー室
    {tx:26,ty:18}, // 法務AI → 待機場（非常勤）
    {tx:3,ty:10},  // あきら → エンジニア部屋
    {tx:5,ty:11},  // ひろゆき → エンジニア部屋
    {tx:15,ty:11}, // 宿題管理AI → 管理室
    {tx:16,ty:12}, // 課題管理AI → 管理室
  ];
  MEMBERS.forEach((m,i) => characters.push(new Character(m, starts[i].tx, starts[i].ty)));

  initFilters();
  renderRoster();
  addLog({name:'SYSTEM',emoji:'⚔️',color:'#ffd700'}, 'AI組織ライブビュー起動 — 全メンバー稼働中', 'task');

  fetchRealData();
  fetchHomework();
  setInterval(fetchRealData, 60000);
  setInterval(fetchHomework, 30000); // 30秒おきに宿題更新
  // シミュレーションは控えめに（実データ+宿題がメイン）
  setInterval(triggerTask, 30000 + Math.random()*30000);
  setInterval(startMeeting, 50000 + Math.random()*40000);
  setTimeout(startMeeting, 6000);

  gameLoop();
}

// ========== サイドパネル開閉 ==========
let panelOpen = true;
function togglePanel() {
  const panel = document.getElementById('side-panel');
  const btn = document.getElementById('panel-toggle');
  panelOpen = !panelOpen;
  panel.style.display = panelOpen ? 'flex' : 'none';
  btn.textContent = panelOpen ? '◀' : '▶';
  // リサイズでcanvas再調整
  setTimeout(() => {
    const area = document.getElementById('map-area');
    canvas.width = area.clientWidth;
    canvas.height = area.clientHeight;
  }, 50);
}

function gameLoop() {
  frameCount++;
  drawMap();
  characters.forEach(c=>{c.update();c.draw(ctx);});
  if (frameCount % 180 === 0) renderRoster();
  requestAnimationFrame(gameLoop);
}

window.addEventListener('load', init);
</script>
</body>
</html>
